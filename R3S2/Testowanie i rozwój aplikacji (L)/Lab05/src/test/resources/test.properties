# Timeouty (sekundy)
timeout.implicit=0
timeout.explicit=15
timeout.pageLoad=30

# Rozmiar okna
window.width=1366
window.height=768

# Katalog na zrzuty ekranu z bledow
screenshots.dir=target/screenshots
