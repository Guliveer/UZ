# Konfiguracja zestawu testow Selenium - Lab05
# Wartosci mozna nadpisac z linii komend: -Dapp.planuz.url=...

# URL-e testowanych aplikacji
app.planuz.url=https://plan.uz.zgora.pl/
app.rezerwacja.url=https://rezerwacja.zielona-gora.pl/
app.uz.url=https://www.uz.zgora.pl/
app.wikipedia.url=https://pl.wikipedia.org/wiki/Wikipedia:Strona_g%C5%82%C3%B3wna
